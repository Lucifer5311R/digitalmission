version: '3.8'

services:
  db:
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ./server/src:/app/src
      - ./server/nodemon.json:/app/nodemon.json
      - /app/node_modules
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/index.html:/app/index.html
      - /app/node_modules
    ports:
      - "5173:5173"
      - "80:80"
    environment:
      NODE_ENV: development
